<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login | Smart Campus Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-white flex items-center justify-center p-6 selection:bg-cyan-500 selection:text-slate-900">

    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-cyan-500/10 blur-[120px] rounded-full animate-pulse"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="glass w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl border border-white/10 relative overflow-hidden">
        <div class="flex justify-center mb-8">
            <div class="text-3xl font-black tracking-tighter">SCC<span class="text-cyan-400">.</span></div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-3xl font-black tracking-tight mb-2">Welcome Back</h2>
            <p class="text-slate-400 text-sm font-medium leading-relaxed">Secure access to the Nagpur Campus digital ecosystem.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-2">Email Address</label>
                <div class="relative group">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                    <input type="email" id="loginEmail" class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 outline-none focus:border-cyan-500 transition-all font-medium placeholder:text-slate-600" placeholder="name@college.edu" required>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Password</label>
                    <a href="#" class="text-[10px] font-black uppercase tracking-widest text-cyan-500 hover:text-cyan-300 transition-colors">Forgot?</a>
                </div>
                <div class="relative group">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-cyan-400 transition-colors"></i>
                    <input type="password" id="loginPassword" class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-12 py-4 outline-none focus:border-cyan-500 transition-all font-medium placeholder:text-slate-600" placeholder="••••••••" required>
                    <button type="button" onclick="togglePass()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                        <i class="fas fa-eye" id="passIcon"></i>
                    </button>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-5 bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-black rounded-2xl hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-cyan-500/20 uppercase tracking-widest text-xs">
                    Authorize Access
                </button>
            </div>
        </form>

        <div class="mt-10 text-center">
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">
                New to the platform?
                <a href="../auth/register.html" class="text-cyan-400 hover:text-cyan-300 ml-1 underline decoration-cyan-500/30 underline-offset-4">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        function togglePass() {
            const passInput = document.getElementById('loginPassword');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                passIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
    <script src="../../js/login.js"></script>
</body>
</html>
