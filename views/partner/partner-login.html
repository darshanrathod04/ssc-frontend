<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCC | Partner Access Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap');
        body { background: #020617; font-family: 'Outfit', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-node { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-node:focus { border-color: #a855f7; outline: none; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-3xl bg-purple-500/10 border border-purple-500/20 mb-4">
                <i class="fas fa-building text-3xl text-purple-400"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter">Partner <br><span class="text-slate-600 italic">Authorization.</span></h1>
            <p class="text-slate-500 mt-2 text-xs uppercase tracking-widest font-bold">Secure Talent Gateway</p>
        </div>

        <form id="loginForm" class="glass rounded-[3rem] p-10 space-y-6 border-purple-500/10">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Corporate Identity (Email)</label>
                <input type="email" id="email" required class="w-full px-6 py-4 rounded-2xl input-node text-sm font-bold" placeholder="hr@company.com">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Access Key (Password)</label>
                <input type="password" id="password" required class="w-full px-6 py-4 rounded-2xl input-node text-sm font-bold" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full py-5 bg-purple-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white hover:text-purple-600 transition-all shadow-xl shadow-purple-500/20">
                Initialize Session
            </button>

            <p class="text-center text-[9px] text-slate-600 font-bold uppercase tracking-widest">
                New Partner? <a href="../partner/partner-register.html" class="text-purple-400 hover:underline">Apply for Node</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://scc-r1co.onrender.com/api/partners/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Critical Security Check: Status must be VERIFIED
                    if (data.status !== 'VERIFIED') {
                        alert("ACCESS DENIED: Your account is still PENDING verification from SCC Admins.");
                        return;
                    }

                    // Save session with role
                    localStorage.setItem('scc_user', JSON.stringify({
                        email: data.email,
                        role: 'PARTNER',
                        companyName: data.companyName
                    }));

                    window.location.href = '../partner/partner-dash.html';
                } else {
                    alert("INVALID CREDENTIALS: Authorization failed.");
                }
            } catch (err) {
                alert("MAINFRAME OFFLINE: Connection error");
            }
        };
    </script>
</body>
</html>
