<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCC | Secure Partner Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap');
        body { background: #020617; font-family: 'Outfit', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-node { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-node:focus { border-color: #06b6d4; outline: none; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2); }
        .disabled-btn { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-xl w-full">
        <div class="text-center mb-10">
            <span class="text-cyan-500 font-black uppercase text-xs tracking-[0.5em]">Secure Authorization Node</span>
            <h1 class="text-5xl font-black mt-4 tracking-tighter">Partner <br><span class="text-slate-600 italic">Validation.</span></h1>
        </div>

        <form id="partnerForm" class="glass rounded-[3rem] p-10 space-y-6">
            <div class="space-y-4 p-6 bg-white/5 rounded-3xl border border-white/10">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Corporate Email</label>
                    <div class="flex gap-2">
                        <input type="email" id="email" required class="flex-1 px-6 py-4 rounded-2xl input-node text-sm font-bold" placeholder="hr@company.com">
                        <button type="button" onclick="sendOTP()" id="otpBtn" class="bg-white/10 hover:bg-white/20 px-6 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Request Code</button>
                    </div>
                </div>

                <div id="otpSection" class="space-y-2 hidden">
                    <label class="text-[10px] font-black uppercase text-cyan-500 ml-2">Verification Code</label>
                    <input type="text" id="otpCode" class="w-full px-6 py-4 rounded-2xl input-node text-sm font-mono font-bold text-center tracking-[1em]" placeholder="000000">
                </div>
            </div>

            <div id="detailsSection" class="space-y-6 opacity-50 pointer-events-none transition-all duration-500">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Company Name</label>
                        <input type="text" id="companyName" class="w-full px-6 py-4 rounded-2xl input-node text-sm font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Industry</label>
                        <input type="text" id="industry" class="w-full px-6 py-4 rounded-2xl input-node text-sm font-bold">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Set Access Key (Password)</label>
                        <input type="password" id="regPassword" required 
                         class="w-full px-6 py-4 rounded-2xl input-node text-sm font-bold" 
                         placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" id="registerBtn" class="w-full py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all shadow-xl shadow-cyan-500/20 disabled-btn">
                    Complete Authorization
                </button>
            </div>
        </form>
    </div>

    <script>
        let isVerified = false;

        async function sendOTP() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Enter corporate email node.");
            
            document.getElementById('otpBtn').innerText = "SENDING...";
            
            try {
                const response = await fetch('https://scc-r1co.onrender.com/api/partners/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    document.getElementById('otpSection').classList.remove('hidden');
                    document.getElementById('otpBtn').innerText = "RESEND";
                    alert("Code transmitted to " + email);
                    // Start listening for verification input
                    document.getElementById('otpCode').addEventListener('input', verifyOTP);
                }
            } catch (err) { alert("Mainframe connection error."); }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('otpCode').value;
            
            if(code.length === 6) {
                try {
                    const response = await fetch('https://scc-r1co.onrender.com/api/partners/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, code })
                    });

                    if (response.ok) {
                        isVerified = true;
                        document.getElementById('detailsSection').style.opacity = "1";
                        document.getElementById('detailsSection').style.pointerEvents = "auto";
                        document.getElementById('registerBtn').classList.remove('disabled-btn');
                        document.getElementById('otpSection').innerHTML = `<p class="text-green-400 text-[10px] font-black uppercase text-center tracking-widest"><i class="fas fa-check-circle"></i> Identity Authenticated</p>`;
                    }
                } catch (err) { console.error("Verify failed"); }
            }
        }

        document.getElementById('partnerForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!isVerified) return;

            const partnerData = {
                companyName: document.getElementById('companyName').value,
                industry: document.getElementById('industry').value,
                email: document.getElementById('email').value,
                password: document.getElementById('regPassword').value,
                status: 'PENDING_ADMIN_APPROVAL'
            };

            const response = await fetch('https://scc-r1co.onrender.com/api/partners/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(partnerData)
            });

            if (response.ok) {
                alert("Node registration complete. Awaiting admin approval.");
                window.location.href = '../shared/index.html';
            }
        };
    </script>
</body>
</html>
