<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup Conclave | Global Talent Acquisition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-white">

    <nav class="fixed w-full z-50 glass py-4 px-12 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
                <i class="fas fa-briefcase text-slate-950"></i>
            </div>
            <div class="text-2xl font-black tracking-tighter uppercase">SCC<span class="text-cyan-400">.</span> CONCLAVE</div>
        </div>
        <div class="flex items-center gap-8">
            <span class="text-[10px] font-black uppercase tracking-widest text-green-400 border border-green-400/20 px-3 py-1 rounded-md">Partner Access: Verified</span>
            <a href="../partner/partner-dash.html" class="text-xs font-bold uppercase hover:text-cyan-400">Portal</a>
        </div>
    </nav>

    <main class="pt-40 px-12 max-w-7xl mx-auto">
        <header class="mb-20">
            <span class="text-cyan-500 font-black uppercase text-xs tracking-[0.5em]">Talent Search Node</span>
            <h1 class="text-7xl font-black mt-4 tracking-tighter">Acquire <br><span class="text-slate-700 italic">Nagpur's Elite.</span></h1>

            <div class="mt-12 flex gap-4 p-2 bg-white/5 rounded-3xl border border-white/10 max-w-2xl">
                <input type="text" placeholder="Search Skills (e.g. Spring Boot, React)" 
                       class="flex-1 bg-transparent px-6 py-4 outline-none font-bold text-sm">
                <button class="bg-cyan-500 text-slate-950 px-10 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all">Scan Mainframe</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20" id="talentPool">
            <div class="glass p-8 rounded-[3rem] border-white/5 group hover:border-cyan-500/30 transition-all">
                <div class="flex items-center gap-6 mb-8">
                    <img src="images/darshan.jpeg" class="w-20 h-20 rounded-2xl object-cover grayscale group-hover:grayscale-0 transition-all border border-white/10"
                         onerror="this.src='https://ui-avatars.com/api/?name=User&background=020617&color=06b6d4'">
                    <div>
                        <h3 class="text-xl font-black tracking-tight">Darshan Rathod</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Full Stack Engineer</p>
                    </div>
                </div>

                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-[9px] font-black uppercase text-slate-500">
                        <span>Mainframe Score</span>
                        <span class="text-cyan-400">880 XP</span>
                    </div>
                    <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="w-[88%] h-full bg-cyan-500"></div>
                    </div>
                </div>

                <button onclick="generateProfessionalResume()" 
                        class="w-full py-4 glass border-white/10 rounded-2xl font-black text-[10px] uppercase tracking-widest group-hover:bg-white group-hover:text-slate-950 transition-all">
                    View Verified Resume
                </button>
            </div>
        </div>
    </main>
    <script>
        (function protectConclave() {
    const sessionNode = JSON.parse(localStorage.getItem('scc_user'));
    
    // Only allow PARTNER or ADMIN to view this talent pool
    if (!sessionNode || (sessionNode.role !== 'PARTNER' && sessionNode.role !== 'ADMIN')) {
        alert("ACCESS DENIED: Only Verified Partners can scan the Mainframe.");
        window.location.href = '../partner/partner-login.html';
    }
})();

function searchTalent() {
    const query = document.querySelector('input').value.toLowerCase();
    const cards = document.querySelectorAll('#talentPool > div');

    cards.forEach(card => {
        const name = card.querySelector('h3').innerText.toLowerCase();
        const skills = card.querySelector('p').innerText.toLowerCase();
        
        if (name.includes(query) || skills.includes(query)) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}
// Link this to your search button's onclick

    async function loadTalentPool() {
        const talentPool = document.getElementById('talentPool');
        try {
            const response = await fetch('https://scc-r1co.onrender.com/api/students/leaderboard');
            const allUsers = await response.json();

            // FILTER: Only show STUDENTS for recruiters
            const studentsOnly = allUsers.filter(user => user.role === 'STUDENT');

            talentPool.innerHTML = studentsOnly.map(student => {
                // Calculate percentage for the progress bar (based on 1000 XP max)
                const xpPercentage = Math.min((student.experiencePoints / 1000) * 100, 100);
                
                return `
                <div class="glass p-8 rounded-[3rem] border-white/5 group hover:border-cyan-500/30 transition-all">
                    <div class="flex items-center gap-6 mb-8">
                        <img src="https://scc-r1co.onrender.com/images/${student.profileImage || 'user.png'}" 
                             onerror="this.src='https://ui-avatars.com/api/?name=${student.fullName}&background=020617&color=06b6d4'"
                             class="w-20 h-20 rounded-2xl object-cover grayscale group-hover:grayscale-0 transition-all border border-white/10">
                        <div>
                            <h3 class="text-xl font-black tracking-tight">${student.fullName}</h3>
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                ${student.skills ? student.skills : 'Verified System Node'}
                            </p>
                        </div>
                    </div>

                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-[9px] font-black uppercase text-slate-500">
                            <span>Mainframe Score</span>
                            <span class="text-cyan-400">${student.experiencePoints || 0} XP</span>
                        </div>
                        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-cyan-500 transition-all duration-1000" style="width: ${xpPercentage}%"></div>
                        </div>
                    </div>

                    <button onclick="viewProfile(${student.id})" 
                            class="w-full py-4 glass border-white/10 rounded-2xl font-black text-[10px] uppercase tracking-widest group-hover:bg-white group-hover:text-slate-950 transition-all">
                        View Verified Resume
                    </button>
                </div>`;
            }).join('');
        } catch (err) {
            console.error("Talent Node Offline");
        }
    }

    // Redirect to a specific profile view
    function viewProfile(id) {
        // You can save the selected student ID to localStorage to view their specific resume page
        localStorage.setItem('viewing_student_id', id);
        window.location.href = '../partner/profile-view.html';
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', loadTalentPool);
// Inside your fetch function for the Conclave list
const partnerSession = JSON.parse(localStorage.getItem('scc_user'));

function renderStudents(students) {
    const container = document.getElementById('conclaveGrid');
    
    container.innerHTML = students.map(student => `
        <div class="glass p-8 rounded-[3rem] border-white/5 relative group hover:border-purple-500/30 transition-all">
            
            ${student.hasApplied ? `
                <div class="absolute -top-3 -right-3 px-4 py-1 bg-purple-600 text-white text-[8px] font-black uppercase rounded-full shadow-lg shadow-purple-500/40 animate-pulse">
                    Incoming App
                </div>
            ` : ''}

            <div class="flex items-center gap-4 mb-6">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-white font-black">
                    ${student.fullName.charAt(0)}
                </div>
                <div>
                    <h4 class="font-black uppercase tracking-tighter">${student.fullName}</h4>
                    <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-widest">${student.xp} XP Verified</p>
                </div>
            </div>

            <button onclick="window.location.href='profile-view.html?id=${student.id}'" 
                    class="w-full py-4 glass border-white/10 rounded-2xl text-[9px] font-black uppercase tracking-[0.2em] hover:bg-white hover:text-slate-950 transition-all">
                Review Node
            </button>
        </div>
    `).join('');
}
let searchTimeout;

function handleSearch(event) {
    const searchTerm = event.target.value;
    
    // We use a timeout so we don't log every single keystroke (Debouncing)
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        if (searchTerm.length > 2) {
            logSearchQuery(searchTerm);
        }
    }, 1000);
}

async function logSearchQuery(query) {
    const session = JSON.parse(localStorage.getItem('scc_user'));
    if (!session || session.role !== 'PARTNER') return;

    // Send the search intent to the analytics tracker
    fetch(`https://scc-r1co.onrender.com/api/leads/track-search?query=${query}&partnerEmail=${session.email}`, {
        method: 'POST'
    });
}

</script>
</body>
</html>
